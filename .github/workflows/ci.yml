name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore AvaloniaRichEditor.slnx
      - name: Build
        run: dotnet build AvaloniaRichEditor.slnx -c Release --no-restore
      - name: Test
        run: dotnet test tests/AvaloniaRichEditor.Tests/AvaloniaRichEditor.Tests.csproj -c Release --no-build

  pack:
    name: Pack & Publish (on tag)
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): nuget.org must have a publishing policy registered for this
    # repository + this workflow file (owner: centwon). No long-lived API key is stored.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        run: dotnet pack src/AvaloniaRichEditor/AvaloniaRichEditor.csproj -c Release -o artifacts -p:ContinuousIntegrationBuild=true
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget
          path: artifacts/*.*nupkg
      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: centwon
      - name: Push to nuget.org
        run: dotnet nuget push "artifacts/*.nupkg" -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
