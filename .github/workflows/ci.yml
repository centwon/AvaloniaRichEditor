name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore AvaloniaRichEditor.slnx
      - name: Build
        run: dotnet build AvaloniaRichEditor.slnx -c Release --no-restore
      - name: Test
        run: dotnet test tests/AvaloniaRichEditor.Tests/AvaloniaRichEditor.Tests.csproj -c Release --no-build

  pack:
    name: Pack (on tag)
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        run: dotnet pack src/AvaloniaRichEditor/AvaloniaRichEditor.csproj -c Release -o artifacts
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: artifacts/*.*nupkg
      # To publish to nuget.org, add a NUGET_API_KEY secret and uncomment:
      # - name: Push
      #   run: dotnet nuget push "artifacts/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
